<VirtualHost *:80>
    ServerName srv.homelab.local
    Redirect permanent / https://srv.homelab.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName srv.homelab.local
    DocumentRoot /var/www/homelab

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/homelab.crt
    SSLCertificateKeyFile /etc/ssl/private/homelab.key
</VirtualHost>
